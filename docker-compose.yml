# Taman Wahana Nusantara
# Seluruh service diambil dari image registry, tidak ada proses build di sini.
#
# Akses langsung lewat port host:
#   - Aplikasi (antarmuka + API) : http://<ip>:6003
#   - RabbitMQ management        : http://<ip>:6004   (guest / guest)
#   - Redis                      : <ip>:6005
# Akses lewat domain (Traefik milik Coolify, HTTPS otomatis Let's Encrypt):
#   - Aplikasi : https://topik-khusus.akademik.anla.works
#   - RabbitMQ : https://rabbitmq.akademik.anla.works

services:
  redis:
    image: redis:7-alpine
    container_name: wahana-redis
    ports:
      - "6005:6379"
    networks:
      - wahana-net
    volumes:
      - wahana-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wahana-rabbitmq
    ports:
      - "6004:15672"
    networks:
      - wahana-net
      - coolify
    volumes:
      - wahana-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.wahana-rabbitmq-http.rule=Host(`rabbitmq.akademik.anla.works`)"
      - "traefik.http.routers.wahana-rabbitmq-http.entrypoints=http"
      - "traefik.http.routers.wahana-rabbitmq-http.middlewares=wahana-rabbitmq-redirect"
      - "traefik.http.middlewares.wahana-rabbitmq-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.wahana-rabbitmq.rule=Host(`rabbitmq.akademik.anla.works`)"
      - "traefik.http.routers.wahana-rabbitmq.entrypoints=https"
      - "traefik.http.routers.wahana-rabbitmq.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wahana-rabbitmq.service=wahana-rabbitmq"
      - "traefik.http.services.wahana-rabbitmq.loadbalancer.server.port=15672"

  app:
    image: itsanla/s6.tp.flash-sale:v2.0.0
    container_name: wahana-app
    environment:
      APP_MODE: all
      APP_ENV: production
      PORT: "8080"
      # SQLite disimpan pada volume supaya data tetap ada setelah container diperbarui.
      DATABASE_PATH: /app/data/wahana.db
      # Nama container dipakai sebagai hostname, bukan nama generik seperti "redis",
      # supaya tidak tertukar dengan service milik Coolify pada network yang di-share.
      REDIS_ADDR: wahana-redis:6379
      RABBITMQ_URL: amqp://guest:guest@wahana-rabbitmq:5672/
      PAYMENT_TTL_MINUTES: "10"
      CACHE_TTL_SECONDS: "60"
      QUOTA_TTL_DAYS: "45"
      MERCHANT_NAME: "TAMAN WAHANA SIMULASI"
      MERCHANT_CITY: "PADANG"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "Wahana2026!"
      JWT_SECRET: "8f42c1d9a7b34e6f95c208d3e71a4b6f0c9d85e23a7148bf6d0e39c5b2a874fd"
      JWT_EXPIRY_HOURS: "4"
    ports:
      - "6003:8080"
    volumes:
      - wahana-app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - wahana-net
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.wahana-app-http.rule=Host(`topik-khusus.akademik.anla.works`)"
      - "traefik.http.routers.wahana-app-http.entrypoints=http"
      - "traefik.http.routers.wahana-app-http.middlewares=wahana-app-redirect"
      - "traefik.http.middlewares.wahana-app-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.wahana-app.rule=Host(`topik-khusus.akademik.anla.works`)"
      - "traefik.http.routers.wahana-app.entrypoints=https"
      - "traefik.http.routers.wahana-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wahana-app.service=wahana-app"
      - "traefik.http.services.wahana-app.loadbalancer.server.port=8080"

networks:
  wahana-net:
    name: wahana-net
    driver: bridge
  coolify:
    external: true

volumes:
  wahana-app-data:
  wahana-redis-data:
  wahana-rabbitmq-data:
